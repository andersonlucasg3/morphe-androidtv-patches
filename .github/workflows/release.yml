name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install semantic-release dependencies
        run: npm ci

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Write Gradle credentials
        run: |
          mkdir -p ~/.gradle
          echo "gpr.user=${{ github.actor }}" >> ~/.gradle/gradle.properties
          echo "gpr.key=${{ secrets.MORPHE_PACKAGES_TOKEN }}" >> ~/.gradle/gradle.properties

       - name: Verify credentials file
        run: |
          echo "=== gradle.properties exists ==="
          ls -la ~/.gradle/gradle.properties
          echo "=== contents (key masked) ==="
          cat ~/.gradle/gradle.properties | sed 's/gpr.key=.*/gpr.key=***MASKED***/'
          echo "=== GRADLE_USER_HOME ==="
          echo $GRADLE_USER_HOME

      - name: Build patch artifact
        run: ./gradlew :patches:buildAndroid generatePatchesList clean

      - name: Build and Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: npx semantic-release
